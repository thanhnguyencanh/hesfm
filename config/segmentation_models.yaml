# =============================================================================
# Semantic Segmentation Model Configurations
# DFormer, ESANet, and other backend configurations
# =============================================================================
#
# This file contains configurations for different segmentation backends
# used in the HESFM system.
#
# Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
# Date: 2026
# =============================================================================

# -----------------------------------------------------------------------------
# Model Selection
# -----------------------------------------------------------------------------
# Available backends:
# - dformer: DFormerv2-Large (highest accuracy, requires RTX 4080+)
# - esanet_pytorch: ESANet-R34-NBt1D PyTorch (good accuracy, moderate GPU)
# - esanet_trt: ESANet-R34-NBt1D TensorRT FP16 (real-time on Jetson)
# - auto: Automatically select based on available hardware

default_backend: "dformer"

# -----------------------------------------------------------------------------
# DFormer Configuration
# -----------------------------------------------------------------------------
dformer:
  # DFormerv2-Large pretrained on SUN RGB-D (37 classes)
  model_path: "models/dformer_large_sunrgbd.pth"

  # Input: square 480×480 (fixed by DFormerv2 architecture)
  input_height: 480
  input_width: 480

  # Dataset / class count
  num_classes: 37
  dataset: "sunrgbd"

  # Inference settings
  use_cuda: true
  fp16: false   # DFormerv2 BN layers are unstable in fp16; keep fp32

  # Output
  output_probabilities: false
  output_uncertainty: true

# -----------------------------------------------------------------------------
# ESANet PyTorch Configuration (Moderate GPU)
# -----------------------------------------------------------------------------
esanet_pytorch:
  # Model variant
  encoder: "resnet34"
  encoder_block: "NonBottleneck1D"

  # Dataset the checkpoint was trained on: 'nyuv2' (40 classes) or 'sunrgbd' (37 classes)
  # Selects correct depth normalization stats and colour palette automatically.
  dataset: "nyuv2"

  # Pretrained weights
  model_path: "models/esanet_r34_nyuv2.pth"

  # Input configuration
  input_height: 480
  input_width: 640

  # Modalities
  modality: "rgbd"  # rgb, depth, rgbd

  # Inference settings
  use_cuda: true
  fp16: true

  # RGB normalization (ImageNet)
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]

  # Depth normalization — must match training dataset (depth in mm, valid pixels only)
  # NYUv2  (Kinect v1):               mean=2841.94941  std=1417.25943
  # SUN RGB-D (multi-sensor incl. RS): mean=19025.14930 std=9880.91607
  depth_mean: 2841.94941272766   # mm
  depth_std:  1417.2594281672277 # mm
  # Note: depth_callback stores depth in metres; preprocess always multiplies by 1000

  # Architecture settings (ESANet-R34-NBt1D defaults)
  num_classes: 40          # 40 for nyuv2, 37 for sunrgbd
  decoder_channels_mode: "decreasing"
  context_module: "ppm"

  # Performance
  # Expected: ~45 FPS on RTX 3080
  batch_size: 1

  # Output
  output_probabilities: true
  output_uncertainty: true

# SUN RGB-D variant — swap in when using the sunrgbd checkpoint
esanet_pytorch_sunrgbd:
  encoder: "resnet34"
  encoder_block: "NonBottleneck1D"
  dataset: "sunrgbd"
  model_path: "models/esanet_r34_sunrgbd.pth"
  input_height: 480
  input_width: 640
  modality: "rgbd"
  use_cuda: true
  fp16: true
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 19025.14930492213
  depth_std:  9880.916071806689
  num_classes: 37
  decoder_channels_mode: "decreasing"
  context_module: "ppm"
  batch_size: 1
  output_probabilities: true
  output_uncertainty: true

# -----------------------------------------------------------------------------
# ESANet TensorRT Configuration (Jetson Orin AGX)
# -----------------------------------------------------------------------------
esanet_trt:
  # TensorRT engine file
  engine_path: "models/esanet_r34_nyuv2_fp16.engine"
  
  # Input configuration (must match engine)
  input_height: 480
  input_width: 640
  
  # Precision
  precision: "fp16"  # fp32, fp16, int8
  
  # Input binding names (from ONNX export)
  input_rgb_name: "rgb"
  input_depth_name: "depth"
  output_name: "output"
  
  # Normalization (applied before inference) — must match training dataset
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 2841.94941272766   # mm (NYUv2)
  depth_std:  1417.2594281672277 # mm (NYUv2)
  
  # TensorRT settings
  max_workspace_size: 1073741824  # 1 GB
  dla_core: -1  # -1 = GPU, 0/1 = DLA core
  
  # Async inference
  async_inference: true
  num_streams: 2
  
  # Performance
  # Expected: ~37 FPS on Jetson Orin AGX (50W mode)
  batch_size: 1
  
  # Output
  output_probabilities: false  # Save memory
  output_uncertainty: true

# SUN RGB-D TRT variant
esanet_trt_sunrgbd:
  engine_path: "models/esanet_r34_sunrgbd_fp16.engine"
  input_height: 480
  input_width: 640
  precision: "fp16"
  dataset: "sunrgbd"
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 19025.14930492213
  depth_std:  9880.916071806689
  num_classes: 37
  max_workspace_size: 1073741824
  dla_core: -1
  async_inference: true
  num_streams: 2
  batch_size: 1
  output_probabilities: false
  output_uncertainty: true

# -----------------------------------------------------------------------------
# TensorRT Engine Build Configuration
# -----------------------------------------------------------------------------
tensorrt_build:
  # ONNX model for conversion
  onnx_path: "models/esanet_r34_nyuv2.onnx"
  
  # Output engine path
  engine_path: "models/esanet_r34_nyuv2_fp16.engine"
  
  # Build settings
  precision: "fp16"
  max_workspace_size: 2147483648  # 2 GB for building
  
  # Optimization profiles (for dynamic shapes)
  min_batch: 1
  opt_batch: 1
  max_batch: 1
  
  # Calibration (for INT8)
  calibration_images: "data/calibration/"
  calibration_cache: "models/esanet_calibration.cache"
  
  # Timing
  avg_timing_iterations: 10
  
  # Strictness
  strict_type_constraints: false
  
  # Verbose output
  verbose: true

# -----------------------------------------------------------------------------
# Model Performance Comparison
# -----------------------------------------------------------------------------
# | Model                | GPU          | Resolution | FPS   | mIoU  |
# |----------------------|--------------|------------|-------|-------|
# | DFormerv2-Large      | RTX 4090     | 640x480    | ~80   | 57.2% |
# | DFormerv2-Large      | RTX 4080     | 640x480    | ~50   | 57.2% |
# | ESANet-R34-NBt1D     | RTX 3080     | 640x480    | ~45   | 50.3% |
# | ESANet-R34-NBt1D     | Jetson Orin  | 640x480    | ~25   | 50.3% |
# | ESANet-R34 TRT FP16  | Jetson Orin  | 640x480    | ~37   | 50.1% |
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Uncertainty Estimation
# -----------------------------------------------------------------------------
uncertainty:
  # Method: edl (Evidential Deep Learning), entropy, ensemble, mc_dropout
  method: "entropy"
  
  # EDL settings (if using EDL-trained model)
  edl:
    evidence_activation: "softplus"  # softplus, relu, exp
    uncertainty_type: "vacuity"  # vacuity, dissonance, total
  
  # Entropy settings
  entropy:
    normalize: true
    temperature: 1.0
  
  # MC Dropout settings
  mc_dropout:
    num_samples: 10
    dropout_rate: 0.1
  
  # Ensemble settings
  ensemble:
    num_models: 3
    model_paths:
      - "models/esanet_ensemble_1.pth"
      - "models/esanet_ensemble_2.pth"
      - "models/esanet_ensemble_3.pth"

# -----------------------------------------------------------------------------
# Post-processing
# -----------------------------------------------------------------------------
postprocessing:
  # CRF refinement
  crf:
    enabled: false
    num_iterations: 5
    bilateral_weight: 10.0
    gaussian_weight: 3.0
  
  # Morphological operations
  morphology:
    enabled: false
    opening_kernel_size: 3
    closing_kernel_size: 3
  
  # Confidence filtering
  confidence_filter:
    enabled: true
    threshold: 0.3
    fill_value: 255  # Unknown class

# -----------------------------------------------------------------------------
# Data Augmentation (for evaluation/debugging)
# -----------------------------------------------------------------------------
augmentation:
  enabled: false
  
  # Geometric
  horizontal_flip: false
  random_crop: false
  crop_size: [480, 640]
  
  # Color
  color_jitter: false
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.1
  
  # Depth
  depth_noise: false
  depth_noise_std: 0.01
