# =============================================================================
# Semantic Segmentation Model Configurations
# DFormer, ESANet, and other backend configurations
# =============================================================================
#
# This file contains configurations for different segmentation backends
# used in the HESFM system.
#
# Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
# Date: 2026
# =============================================================================

# -----------------------------------------------------------------------------
# Model Selection
# -----------------------------------------------------------------------------
# Available backends:
# - dformer: DFormerv2-Large (highest accuracy, requires RTX 4080+)
# - esanet_pytorch: ESANet-R34-NBt1D PyTorch (good accuracy, moderate GPU)
# - esanet_trt: ESANet-R34-NBt1D TensorRT FP16 (real-time on Jetson)
# - auto: Automatically select based on available hardware

default_backend: "dformer"

# -----------------------------------------------------------------------------
# DFormer Configuration (Development - RTX 4090/4080)
# -----------------------------------------------------------------------------
dformer:
  # Model variant: small, base, large
  variant: "large"
  
  # Pretrained weights
  model_path: "models/dformer_large_nyuv2.pth"
  
  # Input configuration
  input_height: 480
  input_width: 640
  
  # Inference settings
  use_cuda: true
  fp16: true  # Mixed precision
  channels_last: true
  
  # Normalization (ImageNet)
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  
  # Depth normalization
  depth_mean: 2.8
  depth_std: 1.4
  
  # Architecture settings
  num_classes: 40
  encoder: "mit_b5"  # Mix Transformer B5
  decoder_channels: 256
  
  # Performance
  # Expected: ~80 FPS on RTX 4090, ~50 FPS on RTX 4080
  batch_size: 1
  
  # Output
  output_probabilities: true
  output_uncertainty: true

# -----------------------------------------------------------------------------
# ESANet PyTorch Configuration (Moderate GPU)
# -----------------------------------------------------------------------------
esanet_pytorch:
  # Model variant
  encoder: "resnet34"
  encoder_block: "NonBottleneck1D"
  
  # Pretrained weights
  model_path: "models/esanet_r34_nbt1d_nyuv2.pth"
  
  # Input configuration
  input_height: 480
  input_width: 640
  
  # Modalities
  modality: "rgbd"  # rgb, depth, rgbd
  
  # Inference settings
  use_cuda: true
  fp16: true
  
  # Normalization
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 2842.9  # mm
  depth_std: 1449.3   # mm
  depth_scale: 1.0    # If depth in meters, set to 1000
  
  # Architecture settings
  num_classes: 40
  decoder_channels_bottleneck: 512
  channels_decoder: [512, 256, 128]
  
  # Context module
  context_module: "ppm"  # ppm, appm, none
  
  # Performance
  # Expected: ~45 FPS on RTX 3080
  batch_size: 1
  
  # Output
  output_probabilities: true
  output_uncertainty: true

# -----------------------------------------------------------------------------
# ESANet TensorRT Configuration (Jetson Orin AGX)
# -----------------------------------------------------------------------------
esanet_trt:
  # TensorRT engine file
  engine_path: "models/esanet_r34_nyuv2_fp16.engine"
  
  # Input configuration (must match engine)
  input_height: 480
  input_width: 640
  
  # Precision
  precision: "fp16"  # fp32, fp16, int8
  
  # Input binding names (from ONNX export)
  input_rgb_name: "rgb"
  input_depth_name: "depth"
  output_name: "output"
  
  # Normalization (applied before inference)
  rgb_mean: [0.485, 0.456, 0.406]
  rgb_std: [0.229, 0.224, 0.225]
  depth_mean: 2842.9
  depth_std: 1449.3
  
  # TensorRT settings
  max_workspace_size: 1073741824  # 1 GB
  dla_core: -1  # -1 = GPU, 0/1 = DLA core
  
  # Async inference
  async_inference: true
  num_streams: 2
  
  # Performance
  # Expected: ~37 FPS on Jetson Orin AGX (50W mode)
  batch_size: 1
  
  # Output
  output_probabilities: false  # Save memory
  output_uncertainty: true

# -----------------------------------------------------------------------------
# TensorRT Engine Build Configuration
# -----------------------------------------------------------------------------
tensorrt_build:
  # ONNX model for conversion
  onnx_path: "models/esanet_r34_nyuv2.onnx"
  
  # Output engine path
  engine_path: "models/esanet_r34_nyuv2_fp16.engine"
  
  # Build settings
  precision: "fp16"
  max_workspace_size: 2147483648  # 2 GB for building
  
  # Optimization profiles (for dynamic shapes)
  min_batch: 1
  opt_batch: 1
  max_batch: 1
  
  # Calibration (for INT8)
  calibration_images: "data/calibration/"
  calibration_cache: "models/esanet_calibration.cache"
  
  # Timing
  avg_timing_iterations: 10
  
  # Strictness
  strict_type_constraints: false
  
  # Verbose output
  verbose: true

# -----------------------------------------------------------------------------
# Model Performance Comparison
# -----------------------------------------------------------------------------
# | Model                | GPU          | Resolution | FPS   | mIoU  |
# |----------------------|--------------|------------|-------|-------|
# | DFormerv2-Large      | RTX 4090     | 640x480    | ~80   | 57.2% |
# | DFormerv2-Large      | RTX 4080     | 640x480    | ~50   | 57.2% |
# | ESANet-R34-NBt1D     | RTX 3080     | 640x480    | ~45   | 50.3% |
# | ESANet-R34-NBt1D     | Jetson Orin  | 640x480    | ~25   | 50.3% |
# | ESANet-R34 TRT FP16  | Jetson Orin  | 640x480    | ~37   | 50.1% |
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Uncertainty Estimation
# -----------------------------------------------------------------------------
uncertainty:
  # Method: edl (Evidential Deep Learning), entropy, ensemble, mc_dropout
  method: "entropy"
  
  # EDL settings (if using EDL-trained model)
  edl:
    evidence_activation: "softplus"  # softplus, relu, exp
    uncertainty_type: "vacuity"  # vacuity, dissonance, total
  
  # Entropy settings
  entropy:
    normalize: true
    temperature: 1.0
  
  # MC Dropout settings
  mc_dropout:
    num_samples: 10
    dropout_rate: 0.1
  
  # Ensemble settings
  ensemble:
    num_models: 3
    model_paths:
      - "models/esanet_ensemble_1.pth"
      - "models/esanet_ensemble_2.pth"
      - "models/esanet_ensemble_3.pth"

# -----------------------------------------------------------------------------
# Post-processing
# -----------------------------------------------------------------------------
postprocessing:
  # CRF refinement
  crf:
    enabled: false
    num_iterations: 5
    bilateral_weight: 10.0
    gaussian_weight: 3.0
  
  # Morphological operations
  morphology:
    enabled: false
    opening_kernel_size: 3
    closing_kernel_size: 3
  
  # Confidence filtering
  confidence_filter:
    enabled: true
    threshold: 0.3
    fill_value: 255  # Unknown class

# -----------------------------------------------------------------------------
# Data Augmentation (for evaluation/debugging)
# -----------------------------------------------------------------------------
augmentation:
  enabled: false
  
  # Geometric
  horizontal_flip: false
  random_crop: false
  crop_size: [480, 640]
  
  # Color
  color_jitter: false
  brightness: 0.2
  contrast: 0.2
  saturation: 0.2
  hue: 0.1
  
  # Depth
  depth_noise: false
  depth_noise_std: 0.01
