# =============================================================================
# HESFM Configuration for NVIDIA Jetson Orin AGX
# Optimized for real-time performance (>10 Hz)
# =============================================================================
#
# This configuration prioritizes speed over accuracy:
# - Lower resolution map
# - Aggressive downsampling
# - Fewer primitives
# - Reduced publish rates
#
# Target: 10+ Hz semantic mapping on Jetson Orin AGX (50W mode)
#
# Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
# Date: 2026
# =============================================================================

# -----------------------------------------------------------------------------
# Frame IDs
# -----------------------------------------------------------------------------
frames:
  map_frame: "map"
  odom_frame: "odom"
  base_frame: "base_link"
  sensor_frame: "camera_color_optical_frame"

# -----------------------------------------------------------------------------
# Semantic Map Configuration (Reduced for Speed)
# -----------------------------------------------------------------------------
map:
  # Coarser resolution for faster updates
  resolution: 0.08
  
  # Smaller map for memory efficiency
  size_x: 15.0
  size_y: 15.0
  size_z: 2.5
  
  origin_x: -7.5
  origin_y: -7.5
  origin_z: -0.3
  
  num_classes: 40
  log_odds_min: -8.0
  log_odds_max: 8.0
  prior_prob: 0.025
  
  # Strict memory limit for Jetson
  max_cells: 500000

# -----------------------------------------------------------------------------
# Semantic Segmentation (TensorRT Optimized)
# -----------------------------------------------------------------------------
segmentation:
  # Use TensorRT for maximum speed
  backend: "esanet_trt"
  
  # Lower resolution input
  input_width: 640
  input_height: 480
  
  num_classes: 40
  confidence_threshold: 0.25  # Slightly lower for speed
  
  # TensorRT engine
  esanet_trt_engine: "models/esanet_r34_nyuv2_fp16.engine"
  
  # Performance options
  use_cuda: true
  fp16: true
  async_inference: true  # Async for pipelining
  
  # Minimal outputs
  publish_color: false
  publish_probabilities: false
  publish_uncertainty: true

# -----------------------------------------------------------------------------
# Uncertainty (Simplified)
# -----------------------------------------------------------------------------
uncertainty:
  # Reduced weights for faster computation
  w_semantic: 0.50
  w_spatial: 0.15
  w_observation: 0.25
  w_temporal: 0.10
  
  # Larger radius = fewer neighbors to check
  spatial_radius: 0.25
  min_neighbors: 2
  
  sigma_range: 0.5
  sigma_density: 0.3
  sigma_angle: 0.2
  max_density: 50.0
  
  temporal_resolution: 0.1
  temporal_window: 5

# -----------------------------------------------------------------------------
# Gaussian Primitives (Reduced Count)
# -----------------------------------------------------------------------------
primitives:
  # Fewer primitives for speed
  target_primitives: 64
  
  # More points per primitive
  min_points_per_primitive: 10
  max_points_per_primitive: 500
  
  # Higher conflict tolerance
  conflict_threshold: 0.4
  
  regularization: 0.002
  uncertainty_weight_lambda: 0.8
  
  # Fewer K-means iterations
  kmeans_max_iter: 50
  kmeans_tolerance: 0.001

# -----------------------------------------------------------------------------
# Adaptive Kernel (Simplified)
# -----------------------------------------------------------------------------
kernel:
  # Wider length scales = faster convergence
  length_scale_min: 0.15
  length_scale_max: 0.4
  
  # Higher threshold = less computation
  uncertainty_threshold: 0.75
  uncertainty_low: 0.35
  gamma: 1.5
  
  reachability_lambda: 0.8
  confidence_weight_beta: 1.5
  entropy_weight_gamma: 0.8
  
  kernel_type: "sparse"

# -----------------------------------------------------------------------------
# Navigation
# -----------------------------------------------------------------------------
navigation:
  costmap_height_min: 0.0
  costmap_height_max: 0.4
  
  free_cost: 0
  unknown_cost: -1
  obstacle_cost: 100
  
  # Smaller inflation for tighter navigation
  inflation_radius: 0.25
  cost_scaling_factor: 8.0
  
  min_confidence: 0.25
  
  traversable_classes: [1, 19]
  obstacle_classes: [0, 3, 4, 5, 6, 7, 8, 9, 13, 14, 16, 23, 24, 30, 32, 33, 35]

# -----------------------------------------------------------------------------
# Exploration (Reduced Complexity)
# -----------------------------------------------------------------------------
exploration:
  max_distance: 8.0
  min_info_gain: 0.15
  max_goals: 5
  
  # Shorter sensor range assumption
  sensor_range: 4.0
  sensor_fov_horizontal: 1.2
  sensor_fov_vertical: 0.9
  
  min_obstacle_distance: 0.4
  
  weight_info_gain: 1.0
  weight_distance: 0.4
  weight_uncertainty: 0.4
  
  min_frontier_size: 15
  
  # Lower update rate
  update_rate: 0.5

# -----------------------------------------------------------------------------
# Sensor Configuration
# -----------------------------------------------------------------------------
sensor:
  # Reduced range for indoor
  max_range: 5.0
  min_range: 0.2
  
  range_sigma: 0.03
  angular_sigma: 0.015
  density_radius: 0.15
  
  # Lower resolution intrinsics
  fx: 386.0
  fy: 386.0
  cx: 320.0
  cy: 240.0
  width: 640
  height: 480

# -----------------------------------------------------------------------------
# Processing (Optimized for Jetson)
# -----------------------------------------------------------------------------
processing:
  # Lower publish rates
  map_publish_rate: 1.0
  costmap_publish_rate: 2.0
  primitive_publish_rate: 5.0
  
  # Aggressive downsampling
  downsample_factor: 4
  voxel_filter_size: 0.03
  
  # Use all available cores
  num_threads: 8
  use_async_processing: true
  
  queue_size: 5

# -----------------------------------------------------------------------------
# Visualization (Minimal for Performance)
# -----------------------------------------------------------------------------
visualization:
  point_size: 0.08
  publish_legend: false  # Disable for performance
  highlight_class: -1
  show_primitives: false  # Disable by default
  primitive_alpha: 0.5
  uncertainty_colormap: "jet"

# -----------------------------------------------------------------------------
# Jetson-Specific Settings
# -----------------------------------------------------------------------------
jetson:
  # Power mode: 15W, 30W, 50W, MAXN
  power_mode: "50W"
  
  # GPU memory allocation (fraction)
  gpu_mem_fraction: 0.8
  
  # CPU governor
  cpu_governor: "schedutil"
  
  # Fan mode: cool, quiet
  fan_mode: "cool"
  
  # NVPMODEL settings
  nvpmodel_mode: 2  # 50W mode
  
  # Jetson clocks
  jetson_clocks: true
  
  # Memory optimization
  use_unified_memory: true
  preallocate_buffers: true

# -----------------------------------------------------------------------------
# Performance Monitoring
# -----------------------------------------------------------------------------
monitoring:
  enabled: true
  print_interval: 10.0
  log_to_file: true
  log_file: "/tmp/hesfm_jetson_stats.csv"
  
  # Metrics to track
  track_fps: true
  track_latency: true
  track_memory: true
  track_gpu_usage: true
  track_temperature: true
