# =============================================================================
# HESFM Navigation Configuration
# Semantic-Aware Navigation Parameters
# =============================================================================
#
# This file configures navigation using HESFM semantic costmaps.
# Compatible with ROS Navigation Stack (move_base).
#
# Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
# Date: 2026
# =============================================================================

# -----------------------------------------------------------------------------
# Costmap Generation
# -----------------------------------------------------------------------------
costmap:
  # Resolution (should match HESFM map resolution)
  resolution: 0.05
  
  # Size (should match or exceed HESFM map size)
  size_x: 20.0
  size_y: 20.0
  
  # Origin
  origin_x: -10.0
  origin_y: -10.0
  
  # Height range for 2D projection
  height_min: 0.0
  height_max: 0.5
  
  # Update frequency (Hz)
  update_frequency: 5.0
  
  # Publish frequency (Hz)
  publish_frequency: 2.0

# -----------------------------------------------------------------------------
# Cost Values
# -----------------------------------------------------------------------------
costs:
  # Base costs
  free_cost: 0
  unknown_cost: -1  # -1 = unknown/unobserved
  obstacle_cost: 100  # Lethal
  
  # Inscribed radius (robot footprint)
  inscribed_cost: 99
  
  # Cost thresholds for planning
  lethal_threshold: 100
  unknown_threshold: 255

# -----------------------------------------------------------------------------
# Inflation
# -----------------------------------------------------------------------------
inflation:
  # Inflation radius (meters)
  radius: 0.5
  
  # Cost scaling factor
  # Higher = steeper cost falloff
  cost_scaling_factor: 10.0
  
  # Inscribed radius (actual robot radius)
  inscribed_radius: 0.3
  
  # Circumscribed radius (robot + buffer)
  circumscribed_radius: 0.4

# -----------------------------------------------------------------------------
# Semantic Cost Assignment
# -----------------------------------------------------------------------------
semantic:
  # Enable semantic-aware costs
  enabled: true
  
  # Minimum confidence for cost assignment
  min_confidence: 0.3
  
  # Traversable classes (cost = 0)
  traversable_classes:
    - 1   # floor
    - 19  # floor_mat
  
  # Obstacle classes (cost = 100)
  obstacle_classes:
    - 0   # wall
    - 3   # bed
    - 4   # chair
    - 5   # sofa
    - 6   # table
    - 7   # door (closed)
    - 8   # window
    - 9   # bookshelf
    - 23  # fridge
    - 24  # television
    - 30  # person
    - 32  # toilet
    - 33  # sink
    - 35  # bathtub
  
  # Semi-traversable classes (intermediate cost)
  semi_traversable:
    2: 70    # cabinet
    7: 50    # door (could be open)
    11: 60   # counter
    13: 70   # desk
    14: 50   # shelves
    16: 60   # dresser
    28: 30   # box
    31: 60   # night_stand
    34: 20   # lamp
    36: 20   # bag
    37: 50   # otherstructure
    38: 50   # otherfurniture
    39: 30   # otherprop
  
  # Dynamic obstacle handling
  dynamic_classes:
    - 30  # person
  dynamic_inflation_factor: 1.5

# -----------------------------------------------------------------------------
# Obstacle Detection
# -----------------------------------------------------------------------------
obstacles:
  # Observation sources
  observation_sources: ["semantic_cloud"]
  
  semantic_cloud:
    sensor_frame: "camera_color_optical_frame"
    data_type: "PointCloud2"
    topic: "/semantic_cloud"
    marking: true
    clearing: true
    min_obstacle_height: 0.1
    max_obstacle_height: 2.0
    obstacle_range: 5.0
    raytrace_range: 6.0
  
  # Obstacle persistence
  obstacle_persistence: 0.0
  
  # Track unknown space
  track_unknown_space: true

# -----------------------------------------------------------------------------
# Global Costmap Layer Configuration
# -----------------------------------------------------------------------------
global_costmap:
  # Update and publish rates
  update_frequency: 2.0
  publish_frequency: 1.0
  
  # Use rolling window (false for static map)
  rolling_window: false
  
  # Static map from HESFM
  static_map: false
  
  # Transform tolerance
  transform_tolerance: 0.5
  
  # Plugins
  plugins:
    - name: "semantic_layer"
      type: "costmap_2d::StaticLayer"
    - name: "inflation_layer"
      type: "costmap_2d::InflationLayer"
  
  semantic_layer:
    map_topic: "/semantic_costmap"
    subscribe_to_updates: true
    track_unknown_space: true
    use_maximum: true

# -----------------------------------------------------------------------------
# Local Costmap Layer Configuration
# -----------------------------------------------------------------------------
local_costmap:
  # Update and publish rates
  update_frequency: 5.0
  publish_frequency: 2.0
  
  # Rolling window
  rolling_window: true
  width: 6.0
  height: 6.0
  
  # Transform tolerance
  transform_tolerance: 0.5
  
  # Plugins
  plugins:
    - name: "obstacle_layer"
      type: "costmap_2d::ObstacleLayer"
    - name: "inflation_layer"
      type: "costmap_2d::InflationLayer"

# -----------------------------------------------------------------------------
# Recovery Behaviors
# -----------------------------------------------------------------------------
recovery:
  # Enable recovery behaviors
  enabled: true
  
  # Recovery behavior sequence
  behaviors:
    - name: "conservative_reset"
      type: "clear_costmap_recovery/ClearCostmapRecovery"
    - name: "rotate_recovery"
      type: "rotate_recovery/RotateRecovery"
    - name: "aggressive_reset"
      type: "clear_costmap_recovery/ClearCostmapRecovery"
  
  # Semantic-aware recovery
  semantic_recovery:
    enabled: true
    # Prefer moving towards traversable areas
    preferred_classes: [1, 19]
    recovery_distance: 1.0

# -----------------------------------------------------------------------------
# Path Planning
# -----------------------------------------------------------------------------
planning:
  # Global planner
  global_planner: "navfn/NavfnROS"
  
  # Allow planning through unknown space
  allow_unknown: true
  
  # Default tolerance
  default_tolerance: 0.1
  
  # Planner frequency (Hz)
  planner_frequency: 1.0
  
  # Planner patience (seconds)
  planner_patience: 5.0

# -----------------------------------------------------------------------------
# Local Planning (DWA)
# -----------------------------------------------------------------------------
local_planner:
  # Local planner type
  type: "dwa_local_planner/DWAPlannerROS"
  
  # Robot velocity limits
  max_vel_x: 0.5
  min_vel_x: -0.1
  max_vel_y: 0.0  # Non-holonomic
  min_vel_y: 0.0
  max_vel_theta: 1.0
  min_vel_theta: -1.0
  
  max_vel_trans: 0.5
  min_vel_trans: 0.1
  
  # Acceleration limits
  acc_lim_x: 2.5
  acc_lim_y: 0.0
  acc_lim_theta: 3.2
  
  # Goal tolerances
  xy_goal_tolerance: 0.2
  yaw_goal_tolerance: 0.1
  latch_xy_goal_tolerance: false
  
  # Forward simulation
  sim_time: 1.5
  sim_granularity: 0.025
  vx_samples: 20
  vy_samples: 1
  vth_samples: 40
  
  # Trajectory scoring
  path_distance_bias: 32.0
  goal_distance_bias: 24.0
  occdist_scale: 0.1
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  
  # Oscillation prevention
  oscillation_reset_dist: 0.05
  
  # Controller frequency (Hz)
  controller_frequency: 10.0
  controller_patience: 15.0

# -----------------------------------------------------------------------------
# Semantic Path Preferences
# -----------------------------------------------------------------------------
semantic_planning:
  # Enable semantic path cost modulation
  enabled: true
  
  # Prefer paths through certain semantic classes
  preferred_classes:
    - 1   # floor
    - 19  # floor_mat
  
  # Avoid paths near certain classes
  avoided_classes:
    - 30  # person
    - 35  # bathtub
  
  # Cost multipliers
  preferred_cost_factor: 0.5
  avoided_cost_factor: 2.0
