# =============================================================================
# HESFM Exploration Configuration
# EMI-based Autonomous Exploration Parameters
# =============================================================================
#
# This file configures the Extended Mutual Information (EMI) based
# exploration planner for autonomous semantic mapping.
#
# Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
# Date: 2026
# =============================================================================

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
exploration:
  # Enable/disable exploration
  enabled: true
  
  # Update rate for goal computation (Hz)
  update_rate: 1.0
  
  # Frame IDs
  map_frame: "map"
  robot_frame: "base_link"

# -----------------------------------------------------------------------------
# Goal Generation
# -----------------------------------------------------------------------------
goals:
  # Maximum number of candidate goals
  max_goals: 10
  
  # Maximum exploration distance from robot (meters)
  max_distance: 10.0
  
  # Minimum distance between goals (meters)
  min_goal_separation: 1.0
  
  # Goal timeout (seconds)
  goal_timeout: 60.0
  
  # Replan if current goal becomes invalid
  auto_replan: true
  replan_interval: 10.0

# -----------------------------------------------------------------------------
# Information Gain
# -----------------------------------------------------------------------------
information_gain:
  # Minimum information gain threshold
  min_info_gain: 0.1
  
  # Weight for geometric (occupancy) information
  weight_geometric: 1.0
  
  # Weight for semantic information
  weight_semantic: 1.5
  
  # Weight for uncertainty reduction
  weight_uncertainty: 0.5
  
  # Discount factor for distant cells
  distance_discount: 0.1

# -----------------------------------------------------------------------------
# Utility Function
# -----------------------------------------------------------------------------
utility:
  # Utility = w_gain * info_gain - w_dist * distance + w_unc * uncertainty_reduction
  
  # Information gain weight
  weight_info_gain: 1.0
  
  # Distance penalty weight
  weight_distance: 0.3
  
  # Uncertainty reduction weight
  weight_uncertainty: 0.5
  
  # Path length penalty (if path planning available)
  weight_path_length: 0.2
  
  # Prefer goals in known traversable areas
  prefer_known_areas: true
  known_area_bonus: 0.2

# -----------------------------------------------------------------------------
# Frontier Detection
# -----------------------------------------------------------------------------
frontiers:
  # Minimum frontier size (number of cells)
  min_frontier_size: 10
  
  # Maximum frontier size (for splitting)
  max_frontier_size: 500
  
  # Frontier cell classification
  # A cell is a frontier if it's observed and adjacent to unknown space
  unknown_threshold: 0  # Observation count below this = unknown
  
  # Clustering
  clustering_radius: 0.3  # meters
  
  # Filter frontiers by reachability
  filter_unreachable: true
  
  # Height range for frontier detection
  frontier_height_min: 0.0
  frontier_height_max: 0.5

# -----------------------------------------------------------------------------
# Viewpoint Sampling
# -----------------------------------------------------------------------------
viewpoints:
  # Number of viewpoints to sample per frontier
  samples_per_frontier: 8
  
  # Viewpoint distance from frontier (as fraction of sensor range)
  view_distance_ratio: 0.7
  
  # Height offset from ground (meters)
  view_height: 0.5
  
  # Angular sampling resolution (radians)
  angular_resolution: 0.785  # 45 degrees
  
  # Prefer viewpoints aligned with robot orientation
  prefer_forward: true
  forward_bonus: 0.1

# -----------------------------------------------------------------------------
# Sensor Model (for visibility computation)
# -----------------------------------------------------------------------------
sensor:
  # Maximum sensing range (meters)
  range: 6.0
  
  # Horizontal field of view (radians)
  fov_horizontal: 1.2  # ~69 degrees
  
  # Vertical field of view (radians)
  fov_vertical: 0.9  # ~52 degrees
  
  # Ray casting resolution for visibility
  ray_resolution: 0.1
  
  # Number of rays for EMI computation
  num_rays: 100

# -----------------------------------------------------------------------------
# Safety Constraints
# -----------------------------------------------------------------------------
safety:
  # Minimum distance from obstacles (meters)
  min_obstacle_distance: 0.5
  
  # Minimum distance from unknown space (meters)
  min_unknown_distance: 0.3
  
  # Maximum allowed slope (radians)
  max_slope: 0.3
  
  # Require path to goal (use path planner)
  require_path: false
  
  # Check for dynamic obstacles
  check_dynamic_obstacles: true
  dynamic_obstacle_classes: [30]  # person

# -----------------------------------------------------------------------------
# Exploration Completion
# -----------------------------------------------------------------------------
completion:
  # Coverage threshold (fraction of explorable area)
  coverage_threshold: 0.95
  
  # Mean uncertainty threshold
  uncertainty_threshold: 0.2
  
  # Minimum time exploring (seconds)
  min_exploration_time: 60.0
  
  # Maximum exploration time (seconds, 0 = unlimited)
  max_exploration_time: 0
  
  # Declare complete if no frontiers for this duration (seconds)
  no_frontier_timeout: 30.0

# -----------------------------------------------------------------------------
# Integration with Navigation
# -----------------------------------------------------------------------------
navigation:
  # Send goals to move_base
  use_move_base: true
  
  # move_base action server
  move_base_action: "/move_base"
  
  # Goal tolerance
  xy_goal_tolerance: 0.3
  yaw_goal_tolerance: 0.2
  
  # Abort goal if stuck for this duration (seconds)
  stuck_timeout: 30.0
  
  # Recovery behavior on failure
  recovery_enabled: true
  max_recovery_attempts: 3

# -----------------------------------------------------------------------------
# Visualization
# -----------------------------------------------------------------------------
visualization:
  # Publish frontier markers
  publish_frontiers: true
  frontier_color: [0.0, 1.0, 0.0, 0.8]  # RGBA
  
  # Publish goal markers
  publish_goals: true
  goal_color_best: [0.0, 1.0, 0.0, 1.0]
  goal_color_worst: [1.0, 0.0, 0.0, 0.5]
  
  # Publish EMI visualization
  publish_emi_map: false
  
  # Marker lifetime (seconds)
  marker_lifetime: 2.0

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  # Log exploration progress
  log_progress: true
  log_interval: 10.0
  
  # Save exploration trajectory
  save_trajectory: false
  trajectory_file: "/tmp/exploration_trajectory.csv"
  
  # Save final map
  save_final_map: true
  final_map_file: "/tmp/exploration_map.yaml"
