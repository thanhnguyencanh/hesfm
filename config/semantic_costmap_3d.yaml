# ==============================================================================
# HESFM 3D Semantic Costmap Configuration
# ==============================================================================
# Inspired by SLIDE SLAM (KumarRobotics) and learning-based traversability methods
#
# This costmap combines:
# 1. Semantic class-based traversability costs
# 2. Height-based obstacle filtering
# 3. Uncertainty-aware cost computation from HESFM
# ==============================================================================

semantic_costmap_3d:
  # ---------------------------------------------------------------------------
  # Voxel Grid Parameters
  # ---------------------------------------------------------------------------
  voxel_size: 0.1          # Voxel resolution in meters (10cm default)
  map_size_x: 20.0         # Local map size X (meters)
  map_size_y: 20.0         # Local map size Y (meters)
  map_size_z: 3.0          # Local map size Z (meters)
  
  # ---------------------------------------------------------------------------
  # Robot Parameters
  # ---------------------------------------------------------------------------
  robot_height: 0.5        # Robot height for obstacle filtering (meters)
  robot_radius: 0.3        # Robot radius for inflation (meters)
  ground_clearance: 0.05   # Minimum clearance above ground (meters)
  
  # ---------------------------------------------------------------------------
  # Cost Computation Weights
  # ---------------------------------------------------------------------------
  # Total cost = semantic_cost + uncertainty_cost_factor * uncertainty
  #            + slope_cost_factor * slope + step_cost_factor * step_height
  
  slope_cost_factor: 0.5       # Weight for slope-based cost
  step_cost_factor: 0.3        # Weight for step height cost
  uncertainty_cost_factor: 0.2 # Weight for HESFM uncertainty
  lethal_cost_threshold: 0.9   # Cost above this is considered lethal
  
  # ---------------------------------------------------------------------------
  # Frame Configuration
  # ---------------------------------------------------------------------------
  map_frame: "map"
  robot_frame: "base_link"
  
  # ---------------------------------------------------------------------------
  # Publication Settings
  # ---------------------------------------------------------------------------
  publish_rate: 5.0        # Hz - costmap publication rate
  
  # ---------------------------------------------------------------------------
  # Dataset Configuration
  # ---------------------------------------------------------------------------
  num_classes: 37          # SUN RGB-D: 37 classes

# ==============================================================================
# Semantic Class Traversability Costs (SUN RGB-D 37 classes)
# ==============================================================================
# Cost values: 0.0 = fully traversable, 1.0 = lethal obstacle
# These can be overridden per-class below

traversability_costs:
  # Traversable surfaces
  floor: 0.0
  floor_mat: 0.1
  
  # Low obstacles / soft obstacles
  carpet: 0.2
  paper: 0.3
  towel: 0.3
  clothes: 0.4
  bag: 0.4
  box: 0.5
  pillow: 0.5
  books: 0.5
  
  # Medium obstacles (furniture)
  chair: 0.6
  lamp: 0.6
  table: 0.7
  desk: 0.7
  night_stand: 0.8
  television: 0.8
  sofa: 0.8
  bed: 0.8
  cabinet: 0.85
  shelves: 0.85
  bookshelf: 0.85
  dresser: 0.85
  fridge: 0.9
  
  # Lethal obstacles (walls, fixtures)
  wall: 1.0
  window: 1.0
  mirror: 1.0
  door: 0.95        # Could be open
  whiteboard: 0.95
  toilet: 0.95
  sink: 0.95
  bathtub: 0.95
  counter: 0.7
  
  # Dynamic obstacles
  person: 0.9       # High cost but can move
  
  # Overhead / not obstacles at ground level
  ceiling: 0.0      # Ignored in height filtering
  curtain: 0.3
  blinds: 0.2
  picture: 0.0      # On wall, not obstacle
  shower_curtain: 0.3
  
  # Unknown
  unknown: 0.5

# ==============================================================================
# Height-Based Filtering Rules
# ==============================================================================
# Objects are filtered based on height relative to robot

height_filtering:
  # Ground level objects (below ground_clearance) - treat as traversable if floor
  ground_level_max: 0.05
  
  # Robot body level (ground_clearance to robot_height) - obstacles here matter
  robot_body_min: 0.05
  robot_body_max: 0.5
  
  # Overhead objects (above robot_height) - reduce cost significantly
  overhead_cost_multiplier: 0.1
  
  # Special handling for certain classes
  ceiling_ignore: true          # Always ignore ceiling voxels
  hanging_objects_reduce: true  # Reduce cost for curtains, pictures above robot

# ==============================================================================
# Dynamic Obstacle Handling (SLIDE SLAM inspired)
# ==============================================================================
dynamic_obstacles:
  enabled: true
  
  # Classes considered dynamic
  dynamic_classes:
    - person
  
  # Temporal decay for dynamic obstacles
  decay_time: 5.0        # Seconds before reducing cost
  decay_rate: 0.1        # Cost reduction per second after decay_time
  
  # Inflation around dynamic obstacles
  inflation_radius: 0.5  # Extra clearance around people

# ==============================================================================
# 2D Costmap Projection Settings (for move_base)
# ==============================================================================
costmap_2d_projection:
  enabled: true
  
  # How to combine costs from multiple height levels
  aggregation_method: "max"  # max, mean, or weighted
  
  # Height range for projection
  min_height: 0.05      # Ground clearance
  max_height: 0.5       # Robot height
  
  # Inflation for path planning
  inflation_radius: 0.3
  cost_scaling_factor: 10.0

# ==============================================================================
# Visualization Settings
# ==============================================================================
visualization:
  # 3D costmap markers
  publish_3d_markers: true
  marker_alpha: 0.7
  min_cost_to_display: 0.3  # Don't show low-cost voxels
  
  # Traversability point cloud
  publish_traversability_cloud: true
  
  # Color scheme for costs
  # green (0.0) -> yellow (0.5) -> red (1.0)
  color_map: "traffic_light"
