# =============================================================================
# HESFM Runtime Configuration
# =============================================================================
#
# This file is loaded by `launch/hesfm.launch` into:
# - `hesfm_mapper_node` / `HESFMMapperNodelet`
# - `semantic_cloud_node` / `SemanticCloudNodelet`
#
# It is also preloaded into `/hesfm_mapper_node` so the segmentation node can
# read `navigation/relevant_classes` before the mapper starts.
#
# Launch still controls startup topology and operational switches such as:
# - `launch_camera`, `launch_segmentation`, `launch_mapper`
# - `use_nodelets`
# - `map_frame`, `esanet_dataset`
# - optional debug publishers like `publish_primitives`
# =============================================================================

# -----------------------------------------------------------------------------
# Semantic Map Configuration
# -----------------------------------------------------------------------------
map:
  resolution: 0.05
  size_x: 20.0
  size_y: 20.0
  size_z: 3.0

  origin_x: -10.0
  origin_y: -10.0
  origin_z: -0.5

  # 12 relevant SUNRGBD classes + 1 "other" class after remapping.
  num_classes: 13

# -----------------------------------------------------------------------------
# Uncertainty Decomposition
# -----------------------------------------------------------------------------
uncertainty:
  w_semantic: 0.40
  w_spatial: 0.20
  w_observation: 0.25
  w_temporal: 0.15

  spatial_radius: 0.2
  min_neighbors: 3

  sigma_range: 0.5
  sigma_density: 0.3
  sigma_angle: 0.2
  max_density: 100.0

  temporal_resolution: 0.05

# -----------------------------------------------------------------------------
# Gaussian Primitives
# -----------------------------------------------------------------------------
primitives:
  target_primitives: 256
  min_points_per_primitive: 5
  max_points_per_primitive: 1000
  conflict_threshold: 0.9
  regularization: 0.05
  uncertainty_weight_lambda: 1.0
  kmeans_max_iter: 15
  kmeans_tolerance: 0.01

  use_incremental_updates: true
  incremental_max_distance: 0.25
  full_rebuild_interval: 0

  # Keep primitive belief vectors aligned with the compact class remap.
  num_classes: 13

# -----------------------------------------------------------------------------
# Adaptive Kernel
# -----------------------------------------------------------------------------
kernel:
  length_scale_min: 0.12
  length_scale_max: 0.25
  uncertainty_threshold: 0.7
  uncertainty_low: 0.3
  gamma: 2.0
  reachability_lambda: 1.0
  confidence_weight_beta: 2.0
  entropy_weight_gamma: 1.0

# -----------------------------------------------------------------------------
# Navigation / Semantic Remapping
# -----------------------------------------------------------------------------
navigation:
  relevant_classes: [0, 1, 2, 4, 6, 7, 8, 13, 21, 24, 25, 30]

  # After remapping, floor becomes class 1.
  traversable_classes: [1]

# -----------------------------------------------------------------------------
# Processing
# -----------------------------------------------------------------------------
processing:
  map_publish_rate: 1.0

  # Semantic cloud generation
  downsample_factor: 2
  queue_size: 30

  # Nodelet-only option; ignored by the standalone mapper node.
  use_async_processing: false

# -----------------------------------------------------------------------------
# Sensor Limits
# -----------------------------------------------------------------------------
sensor:
  # These now drive both semantic cloud filtering and mapper uncertainty.
  min_range: 0.5
  max_range: 3.0

# -----------------------------------------------------------------------------
# Semantic Cloud Output
# -----------------------------------------------------------------------------
semantic_cloud:
  use_uncertainty: true
  default_uncertainty: 0.3
  output_frame: "camera_accel_optical_frame"
