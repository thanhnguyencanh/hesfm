#!/usr/bin/env python
"""
HESFM Mapper Dynamic Reconfigure Configuration
Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
"""

from dynamic_reconfigure.parameter_generator_catkin import *

PACKAGE = "hesfm"
gen = ParameterGenerator()

# Uncertainty Weights
uncertainty_group = gen.add_group("Uncertainty")
uncertainty_group.add("w_semantic", double_t, 0, "Semantic uncertainty weight", 0.40, 0.0, 1.0)
uncertainty_group.add("w_spatial", double_t, 0, "Spatial consistency weight", 0.20, 0.0, 1.0)
uncertainty_group.add("w_observation", double_t, 0, "Observation model weight", 0.25, 0.0, 1.0)
uncertainty_group.add("w_temporal", double_t, 0, "Temporal consistency weight", 0.15, 0.0, 1.0)
uncertainty_group.add("spatial_radius", double_t, 0, "Spatial neighborhood radius (m)", 0.2, 0.05, 1.0)
uncertainty_group.add("min_neighbors", int_t, 0, "Minimum neighbors for spatial uncertainty", 3, 1, 20)

# Gaussian Primitives
primitives_group = gen.add_group("Primitives")
primitives_group.add("target_primitives", int_t, 0, "Target number of primitives", 128, 16, 512)
primitives_group.add("min_points_per_primitive", int_t, 0, "Minimum points per primitive", 5, 1, 100)
primitives_group.add("conflict_threshold", double_t, 0, "DST conflict threshold", 0.3, 0.0, 1.0)
primitives_group.add("uncertainty_weight_lambda", double_t, 0, "Uncertainty weight in clustering", 1.0, 0.0, 5.0)

# Adaptive Kernel
kernel_group = gen.add_group("Kernel")
kernel_group.add("length_scale_min", double_t, 0, "Min kernel length scale (m)", 0.1, 0.01, 1.0)
kernel_group.add("length_scale_max", double_t, 0, "Max kernel length scale (m)", 0.5, 0.1, 2.0)
kernel_group.add("uncertainty_threshold", double_t, 0, "Uncertainty gating threshold", 0.7, 0.0, 1.0)
kernel_group.add("gamma", double_t, 0, "Gating function sharpness", 2.0, 0.1, 10.0)
kernel_group.add("confidence_weight_beta", double_t, 0, "Confidence weight exponent", 2.0, 0.0, 5.0)

# Map Update
map_group = gen.add_group("Map")
map_group.add("log_odds_min", double_t, 0, "Minimum log-odds value", -10.0, -20.0, 0.0)
map_group.add("log_odds_max", double_t, 0, "Maximum log-odds value", 10.0, 0.0, 20.0)
map_group.add("prior_prob", double_t, 0, "Prior class probability", 0.025, 0.001, 0.1)

# Processing
processing_group = gen.add_group("Processing")
processing_group.add("map_publish_rate", double_t, 0, "Map publish rate (Hz)", 2.0, 0.1, 30.0)
processing_group.add("costmap_publish_rate", double_t, 0, "Costmap publish rate (Hz)", 5.0, 0.1, 30.0)
processing_group.add("voxel_filter_size", double_t, 0, "Voxel filter size (m)", 0.02, 0.005, 0.1)

# Visualization
vis_group = gen.add_group("Visualization")
vis_group.add("highlight_class", int_t, 0, "Highlight class (-1 = all)", -1, -1, 39)
vis_group.add("point_size", double_t, 0, "Visualization point size (m)", 0.05, 0.01, 0.2)
vis_group.add("show_primitives", bool_t, 0, "Show Gaussian primitives", True)

exit(gen.generate(PACKAGE, "hesfm", "HESFMMapper"))
