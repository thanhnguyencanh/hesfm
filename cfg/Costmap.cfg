#!/usr/bin/env python
"""
Semantic Costmap Dynamic Reconfigure Configuration
Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
"""

from dynamic_reconfigure.parameter_generator_catkin import *

PACKAGE = "hesfm"
gen = ParameterGenerator()

# Costmap Generation
costmap_group = gen.add_group("Costmap")
costmap_group.add("height_min", double_t, 0, "Min height for projection (m)", 0.0, -1.0, 1.0)
costmap_group.add("height_max", double_t, 0, "Max height for projection (m)", 0.5, 0.0, 3.0)
costmap_group.add("publish_rate", double_t, 0, "Publish rate (Hz)", 5.0, 0.1, 30.0)

# Costs
costs_group = gen.add_group("Costs")
costs_group.add("free_cost", int_t, 0, "Free space cost", 0, 0, 100)
costs_group.add("unknown_cost", int_t, 0, "Unknown space cost", -1, -1, 100)
costs_group.add("obstacle_cost", int_t, 0, "Obstacle cost", 100, 0, 255)

# Inflation
inflation_group = gen.add_group("Inflation")
inflation_group.add("inflation_radius", double_t, 0, "Inflation radius (m)", 0.3, 0.0, 2.0)
inflation_group.add("cost_scaling_factor", double_t, 0, "Cost scaling factor", 10.0, 0.1, 50.0)

# Filtering
filter_group = gen.add_group("Filtering")
filter_group.add("min_confidence", double_t, 0, "Min confidence threshold", 0.3, 0.0, 1.0)

exit(gen.generate(PACKAGE, "hesfm", "Costmap"))
