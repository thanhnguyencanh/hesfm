#!/usr/bin/env python
"""
Semantic Segmentation Dynamic Reconfigure Configuration
Author: Thanh Nguyen Canh <thanhnc@jaist.ac.jp>
"""

from dynamic_reconfigure.parameter_generator_catkin import *

PACKAGE = "hesfm"
gen = ParameterGenerator()

# Backend Selection
backend_enum = gen.enum([
    gen.const("DFormer", str_t, "dformer", "DFormerv2-Large"),
    gen.const("ESANet_TRT", str_t, "esanet_trt", "ESANet TensorRT FP16"),
    gen.const("ESANet_PyTorch", str_t, "esanet_pytorch", "ESANet PyTorch"),
    gen.const("Auto", str_t, "auto", "Auto-select")
], "Segmentation backend")

gen.add("backend", str_t, 0, "Segmentation backend", "esanet_trt", edit_method=backend_enum)

# ESANet dataset selection
dataset_enum = gen.enum([
    gen.const("NYUv2",   str_t, "nyuv2",   "NYUv2 40-class (Kinect v1)"),
    gen.const("SUNRGBD", str_t, "sunrgbd", "SUN RGB-D 37-class (multi-sensor incl. RealSense)"),
], "ESANet training dataset")

gen.add("esanet_dataset", str_t, 0, "ESANet training dataset (sets depth stats and colour palette)",
        "sunrgbd", edit_method=dataset_enum)

# Inference Settings
inference_group = gen.add_group("Inference")
inference_group.add("confidence_threshold", double_t, 0, "Confidence threshold", 0.3, 0.0, 1.0)
inference_group.add("fp16", bool_t, 0, "Use FP16 mixed precision", True)
inference_group.add("async_inference", bool_t, 0, "Enable async inference", False)

# Input Processing
input_group = gen.add_group("Input")
input_group.add("input_width", int_t, 0, "Input image width", 640, 320, 1280)
input_group.add("input_height", int_t, 0, "Input image height", 480, 240, 960)

# Output Options
output_group = gen.add_group("Output")
output_group.add("publish_color", bool_t, 0, "Publish colored semantic image", True)
output_group.add("publish_probabilities", bool_t, 0, "Publish class probabilities", True)
output_group.add("publish_uncertainty", bool_t, 0, "Publish uncertainty map", True)

exit(gen.generate(PACKAGE, "hesfm", "SemanticSegmentation"))
